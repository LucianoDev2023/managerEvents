<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plannix | Central Legal</title>
    <meta name="robots" content="index,follow" />
    <style>
      :root {
        --bg: #0b0b0f;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.88);
        --muted: rgba(255, 255, 255, 0.7);
        --title: #fff;
        --link: #9aa7ff;
        --border: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          'Apple Color Emoji',
          'Segoe UI Emoji';
        background: #0b0b0f;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .wrap {
        max-width: 480px;
        width: 100%;
        padding: 24px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        color: #fff;
        font-size: 32px;
        letter-spacing: -0.5px;
      }
      p {
        margin: 0 0 24px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 16px;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      a {
        display: block;
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.95);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s;
      }
      a:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-2px);
        border-color: var(--link);
      }
      .footer {
        margin-top: 32px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Plannix</h1>
      <p>Central de Documentação Legal e Privacidade.</p>
      <div class="links">
        <a href="/privacidade.html">🔒 Política de Privacidade</a>
        <a href="/termos.html">📄 Termos de Uso</a>
      </div>
      <div class="footer">&copy; 2026 Equipe Plannix. Todos os direitos reservados.</div>
    </div>
  </body>
</html>
